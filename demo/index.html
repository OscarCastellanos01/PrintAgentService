<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Print Agent — Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

  <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6v-8z"/>
        </svg>
      </div>
      <div>
        <h1 class="text-sm font-semibold text-slate-900">Print Agent</h1>
        <p class="text-xs text-slate-400">Panel de pruebas</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></span>
      <span id="status-text" class="text-xs text-slate-500">Verificando...</span>
      <button onclick="checkStatus()" class="ml-2 text-xs text-indigo-600 hover:text-indigo-800 font-medium">Reconectar</button>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8 space-y-6">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 space-y-4">
        <div class="flex items-center gap-2">
          <div class="w-6 h-6 bg-indigo-50 rounded-md flex items-center justify-center">
            <svg class="w-3.5 h-3.5 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </div>
          <h2 class="text-sm font-semibold text-slate-700">Imprimir PDF</h2>
        </div>
        <div class="space-y-3">
          <div>
            <label class="label">Archivo PDF</label>
            <label class="flex items-center gap-3 w-full cursor-pointer bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 hover:bg-slate-100 transition-colors">
              <svg class="w-4 h-4 text-slate-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
              </svg>
              <span id="pdf-filename" class="text-sm text-slate-400 truncate">Seleccionar archivo...</span>
              <input id="pdf-file" type="file" accept=".pdf" class="hidden" onchange="updateFilename('pdf-file', 'pdf-filename')">
            </label>
          </div>
          <div>
            <label class="label">Impresora</label>
            <select id="pdf-printer" class="input">
              <option value="">Cargando impresoras...</option>
            </select>
            <label class="mt-1.5 flex items-center gap-2 cursor-pointer select-none">
              <input id="pdf-default" type="checkbox" class="accent-indigo-600" onchange="togglePrinterSelect('pdf-printer', 'pdf-default')">
              <span class="text-xs text-slate-500">Usar impresora predeterminada</span>
            </label>
          </div>
          <div>
            <label class="label">Copias</label>
            <input id="pdf-copies" type="number" value="1" min="1" class="input w-20">
          </div>
        </div>
        <button onclick="printPDF()" class="btn-primary w-full">Imprimir PDF</button>
        <div id="pdf-result" class="hidden"></div>
      </div>

      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 space-y-4">
        <div class="flex items-center gap-2">
          <div class="w-6 h-6 bg-indigo-50 rounded-md flex items-center justify-center">
            <svg class="w-3.5 h-3.5 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
            </svg>
          </div>
          <h2 class="text-sm font-semibold text-slate-700">ZPL RAW</h2>
        </div>
        <div class="space-y-3">
          <div>
            <label class="label">Comando ZPL</label>
            <textarea id="zpl-raw" rows="4" placeholder="^XA&#10;^FO50,50^FDHola desde Print Agent^FS&#10;^XZ" class="input font-mono text-xs resize-none"></textarea>
          </div>
          <div>
            <label class="label">Impresora</label>
            <select id="zpl-printer" class="input">
              <option value="">Cargando impresoras...</option>
            </select>
            <label class="mt-1.5 flex items-center gap-2 cursor-pointer select-none">
              <input id="zpl-default" type="checkbox" class="accent-indigo-600" onchange="togglePrinterSelect('zpl-printer', 'zpl-default')">
              <span class="text-xs text-slate-500">Usar impresora predeterminada</span>
            </label>
          </div>
          <div>
            <label class="label">Copias</label>
            <input id="zpl-copies" type="number" value="1" min="1" class="input w-20">
          </div>
        </div>
        <button onclick="sendZPL()" class="btn-primary w-full">Enviar ZPL</button>
        <div id="zpl-result" class="hidden"></div>
      </div>

    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 space-y-3">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="w-6 h-6 bg-indigo-50 rounded-md flex items-center justify-center">
            <svg class="w-3.5 h-3.5 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6v-8z"/>
            </svg>
          </div>
          <h2 class="text-sm font-semibold text-slate-700">Impresoras instaladas</h2>
        </div>
        <button onclick="loadPrinters()" class="btn">Actualizar</button>
      </div>
      <div id="printers-list" class="hidden"></div>
    </div>

  </main>

  <style>
    .btn {
      @apply px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-slate-200 text-xs font-medium text-slate-700 transition-colors cursor-pointer;
    }
    .btn-primary {
      @apply px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-sm text-white font-medium transition-colors cursor-pointer;
    }
    .input {
      @apply w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-indigo-400 focus:bg-white transition-colors;
    }
    .label {
      @apply block text-xs font-medium text-slate-500 mb-1;
    }
  </style>

  <script src="app.js"></script>

</body>
</html>
